<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>게시글 목록 | 바이브 코딩</title>
    <!-- Tailwind CSS & Google Fonts & Bootstrap 5 (Home.html과 동일 구성) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&amp;family=Inter:wght@100..900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "accent": "#2189ff",
                        "samsung-gray": "#f4f4f4",
                        "text-main": "#000000",
                        "text-sub": "#666666"
                    },
                    fontFamily: {
                        "sans": ["Inter", "Noto Sans KR", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            color: #000000;
        }
        .nav-link {
            @apply text-[14px] font-medium hover:underline underline-offset-4 transition-all;
        }
        .footer-link {
            @apply text-[13px] text-[#666] hover:text-[#000] transition-colors;
        }
        /* Custom Table Style to match Samsung aesthetic */
        .table-custom thead th {
            @apply border-b border-gray-200 py-4 text-[13px] font-bold text-gray-400 uppercase tracking-wider;
            border-top: none;
        }
        .table-custom tbody td {
            @apply py-5 text-[15px] text-text-main border-b border-gray-50;
        }
        .table-custom tbody tr:hover {
            @apply bg-gray-50/50 transition-colors;
        }
    </style>
</head>

<body class="selection:bg-accent/30">
    <!-- Header (home.html과 동일) -->
    <header class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-[1440px] mx-auto px-6 lg:px-12 h-16 flex items-center justify-between">
            <div class="flex items-center gap-10">
                <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='/'">
                    <span class="text-xl font-black tracking-tighter">VIBE CODING</span>
                </div>
                <nav class="hidden lg:flex items-center gap-8">
                    <a class="nav-link" href="/">홈</a>
                    <a class="nav-link" href="/posts">게시판</a>
                </nav>
            </div>
            <div class="flex items-center gap-6">
                <button class="material-symbols-outlined text-2xl">search</button>
                <button class="material-symbols-outlined text-2xl">person</button>
                <button class="lg:hidden material-symbols-outlined text-2xl">menu</button>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-20">
        <div class="max-w-[1440px] mx-auto px-6 lg:px-12">
            <!-- Breadcrumb or Category (Optional Samsung Style) -->
            <div class="mb-12">
                <h1 class="text-[40px] font-bold tracking-tight mb-2">커뮤니티 게시판</h1>
                <p class="text-text-sub text-lg">가장 정교한 인터페이스를 위한 토론과 정보 공유</p>
            </div>

            <!-- List Controls -->
            <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-6">
                <div class="flex gap-4">
                    <button class="px-5 py-2 rounded-full bg-black text-white text-sm font-bold">전체</button>
                    <!-- 공지사항, 자유게시판 필터 기능은 향후 구현 예정으로 주석 처리 -->
                    <!-- 
                    <button onclick="alert('공지사항 필터 기능은 준비 중입니다.')"
                        class="px-5 py-2 rounded-full bg-transparent text-sm font-bold text-text-sub hover:bg-gray-100">공지사항</button>
                    <button onclick="alert('자유게시판 필터 기능은 준비 중입니다.')"
                        class="px-5 py-2 rounded-full bg-transparent text-sm font-bold text-text-sub hover:bg-gray-100">자유게시판</button>
                    -->
                </div>
                <button onclick="location.href='/posts/new'"
                    class="bg-accent text-white px-6 py-2.5 rounded-full font-bold hover:bg-blue-600 transition-all text-sm">글쓰기</button>
            </div>

            <!-- Post List Table -->
            <div class="overflow-x-auto">
                <table class="w-full table-custom border-collapse">
                    <thead>
                        <tr>
                            <th class="w-20 text-left">No.</th>
                            <th class="text-left">제목</th>
                            <th class="w-32 text-left">작성일</th>
                            <th class="w-24 text-center">조회수</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="post : ${posts}">
                            <td class="font-medium text-text-sub" th:text="${post.no}">1</td>
                            <td>
                                <a th:href="@{/posts/{no}(no=${post.no})}"
                                    class="font-bold hover:text-accent transition-colors block py-1"
                                    th:text="${post.title}">게시글 제목입니다.</a>
                            </td>
                            <td class="text-sm text-text-sub"
                                th:text="${#temporals.format(post.createdAt, 'yyyy.MM.dd')}">2024.02.23</td>
                            <td class="text-center text-sm text-text-sub" th:text="${post.views}">123</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="mt-12 flex justify-center gap-2" th:if="${totalPages > 0}">
                <!-- Previous Button -->
                <button th:if="${currentPage > 1}" th:onclick="|location.href='/posts?page=' + ${currentPage - 1}|"
                    class="w-10 h-10 flex items-center justify-center rounded-full border border-gray-200 text-sm font-bold hover:bg-gray-50">
                    <span class="material-symbols-outlined text-[18px]">chevron_left</span>
                </button>

                <!-- Page Numbers -->
                <button th:each="pageNum : ${#numbers.sequence(1, totalPages)}"
                    th:onclick="|location.href='/posts?page=' + ${pageNum}|" th:text="${pageNum}"
                    th:classappend="${pageNum == currentPage} ? 'bg-black text-white' : 'hover:bg-gray-50'"
                    class="w-10 h-10 flex items-center justify-center rounded-full border border-gray-200 text-sm font-bold transition-colors">
                    1
                </button>

                <!-- Next Button -->
                <button th:if="${currentPage < totalPages}"
                    th:onclick="|location.href='/posts?page=' + ${currentPage + 1}|"
                    class="w-10 h-10 flex items-center justify-center rounded-full border border-gray-200 text-sm font-bold hover:bg-gray-50">
                    <span class="material-symbols-outlined text-[18px]">chevron_right</span>
                </button>
            </div>
        </div>
    </main>

    <!-- Footer (home.html과 동일) -->
    <footer class="bg-samsung-gray pt-16 pb-12">
        <div class="max-w-[1440px] mx-auto px-6 lg:px-12">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 mb-16">
                <div class="flex flex-col gap-4">
                    <h5 class="text-sm font-bold mb-2">제품 및 서비스</h5>
                    <a class="footer-link" href="#">쇼케이스</a>
                    <a class="footer-link" href="#">디자인 키트</a>
                    <a class="footer-link" href="#">프로 코드</a>
                </div>
                <div class="flex flex-col gap-4">
                    <h5 class="text-sm font-bold mb-2">고객지원</h5>
                    <a class="footer-link" href="#">공지사항</a>
                    <a class="footer-link" href="#">문의하기</a>
                    <a class="footer-link" href="#">커뮤니티 가이드</a>
                </div>
                <!-- ... 생략 가능하거나 유사하게 유지 ... -->
            </div>
            <div
                class="border-t border-gray-200 pt-8 flex flex-col lg:flex-row justify-between gap-6 text-[12px] text-text-sub">
                <div class="flex flex-col md:flex-row gap-6 md:items-center">
                    <span class="font-bold text-black text-sm tracking-tighter">VIBE CODING</span>
                    <p>Copyright © 2024 Vibe Coding Collective. All rights reserved.</p>
                </div>
                <div class="flex flex-wrap gap-x-8 gap-y-2 font-medium">
                    <a class="hover:text-black" href="#">개인정보 처리방침</a>
                    <a class="hover:text-black" href="#">이용약관</a>
                    <a class="hover:text-black" href="#">한국 / 한국어</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
