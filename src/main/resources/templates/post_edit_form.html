<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>게시글 수정 | 바이브 코딩</title>
    <!-- Tailwind CSS & Google Fonts & Bootstrap 5 -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&amp;family=Inter:wght@100..900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "accent": "#2189ff",
                        "samsung-gray": "#f4f4f4",
                        "text-main": "#000000",
                        "text-sub": "#666666"
                    },
                    fontFamily: {
                        "sans": ["Inter", "Noto Sans KR", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            color: #000000;
        }
        .nav-link {
            @apply text-[14px] font-medium hover:underline underline-offset-4 transition-all;
        }
        .footer-link {
            @apply text-[13px] text-[#666] hover:text-[#000] transition-colors;
        }
        .input-field {
            @apply w-full border-b border-gray-200 py-3 focus:border-accent focus:outline-none transition-all text-[16px] placeholder:text-gray-300;
        }
        .input-field[readonly] {
            @apply bg-transparent text-gray-500 cursor-not-allowed border-none pt-1 pb-1;
        }
        .input-label {
            @apply text-[13px] font-bold text-text-sub uppercase tracking-wider mb-2 block;
        }
    </style>
</head>

<body class="selection:bg-accent/30">
    <!-- Header -->
    <header class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-[1440px] mx-auto px-6 lg:px-12 h-16 flex items-center justify-between">
            <div class="flex items-center gap-10">
                <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='/'">
                    <span class="text-xl font-black tracking-tighter">VIBE CODING</span>
                </div>
                <nav class="hidden lg:flex items-center gap-8">
                    <a class="nav-link" href="/">홈</a>
                    <a class="nav-link" href="/posts">게시판</a>
                </nav>
            </div>
            <div class="flex items-center gap-6">
                <button class="material-symbols-outlined text-2xl">search</button>
                <button class="material-symbols-outlined text-2xl">person</button>
                <button class="lg:hidden material-symbols-outlined text-2xl">menu</button>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-20">
        <div class="max-w-[800px] mx-auto px-6">
            <header class="mb-12">
                <h1 class="text-[32px] font-bold tracking-tight mb-2">게시글 수정</h1>
                <p class="text-text-sub font-medium">작성된 내용을 수정하고 업데이트하세요.</p>
            </header>

            <form th:action="@{/posts/{no}/save(no=${post.no})}" method="post" class="space-y-10">
                <div class="grid grid-cols-2 gap-10">
                    <div>
                        <label class="input-label">글 번호</label>
                        <input class="input-field" th:value="${post.no}" readonly type="text" />
                    </div>
                    <div>
                        <label class="input-label">조회수</label>
                        <input class="input-field" th:value="${post.views}" readonly type="text" />
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-10">
                    <div>
                        <label class="input-label">생성일</label>
                        <input class="input-field" th:value="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}"
                            readonly type="text" />
                    </div>
                    <div>
                        <label class="input-label">수정일</label>
                        <input class="input-field"
                            th:value="${post.updatedAt != null ? #temporals.format(post.updatedAt, 'yyyy-MM-dd') : ''}"
                            readonly type="text" />
                    </div>
                </div>

                <div>
                    <label class="input-label" for="title">제목</label>
                    <input class="input-field font-bold text-xl" id="title" name="title" th:value="${post.title}"
                        placeholder="제목을 입력하세요" required type="text" />
                </div>

                <div>
                    <label class="input-label" for="content">내용</label>
                    <textarea class="input-field min-h-[300px] resize-none" id="content" name="content"
                        th:text="${post.content}" placeholder="내용을 입력하세요" required></textarea>
                </div>

                <div class="pt-10 flex gap-4">
                    <button type="submit"
                        class="flex-1 bg-black text-white py-4 rounded-full font-bold hover:bg-stone-800 transition-all">
                        저장하기
                    </button>
                    <button type="button" th:onclick="|location.href='/posts/' + ${post.no}|"
                        class="flex-1 border border-black text-black py-4 rounded-full font-bold hover:bg-stone-50 transition-all">
                        취소
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-samsung-gray pt-16 pb-12 mt-20">
        <div class="max-w-[1440px] mx-auto px-6 lg:px-12">
            <div
                class="border-t border-gray-200 pt-8 flex flex-col lg:flex-row justify-between gap-6 text-[12px] text-text-sub">
                <div class="flex flex-col md:flex-row gap-6 md:items-center">
                    <span class="font-bold text-black text-sm tracking-tighter">VIBE CODING</span>
                    <p>Copyright © 2024 Vibe Coding Collective. All rights reserved.</p>
                </div>
                <div class="flex flex-wrap gap-x-8 gap-y-2 font-medium">
                    <a class="hover:text-black" href="#">개인정보 처리방침</a>
                    <a class="hover:text-black" href="#">이용약관</a>
                    <a class="hover:text-black" href="#">한국 / 한국어</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
