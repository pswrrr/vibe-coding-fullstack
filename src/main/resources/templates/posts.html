<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 목록 - 바이브 코딩</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8f9fa;
        }

        .container {
            max-width: 1000px;
            margin-top: 50px;
        }

        .table {
            background-color: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .table thead {
            background-color: #000;
            color: #fff;
        }

        .header-section {
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid max-w-1440 px-4">
            <a class="navbar-brand fw-bold" href="/">VIBE CODING</a>
        </div>
    </nav>

    <div class="container">
        <div class="header-section d-flex justify-content-between align-items-end">
            <div>
                <h2 class="fw-bold mb-1">게시글 목록</h2>
                <p class="text-muted mb-0">바이브 코딩의 새로운 소식을 확인하세요.</p>
            </div>
            <button class="btn btn-dark rounded-pill px-4">글쓰기</button>
        </div>

        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th scope="col" class="ps-4">번호</th>
                    <th scope="col">제목</th>
                    <th scope="col">생성일</th>
                    <th scope="col" class="text-center pe-4">조회수</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="post : ${posts}">
                    <td class="ps-4" th:text="${post.no}">1</td>
                    <td>
                        <a href="#" class="text-decoration-none text-dark fw-medium" th:text="${post.title}">게시글
                            제목입니다.</a>
                    </td>
                    <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">2024-02-23</td>
                    <td class="text-center pe-4" th:text="${post.views}">123</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
